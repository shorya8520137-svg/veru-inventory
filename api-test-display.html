<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Website Orders Product Names</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-right: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-weight: 500;
        }
        .loading {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .order-card {
            border: 2px solid #e1e8ed;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            background: #f8f9fa;
        }
        .order-header {
            font-weight: bold;
            color: #2c3e50;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
        }
        .product-item {
            background: #e8f5e8;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border-left: 4px solid #27ae60;
            font-weight: bold;
            color: #27ae60;
        }
        .no-products {
            background: #fdf2f2;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border-left: 4px solid #e74c3c;
            font-weight: bold;
            color: #e74c3c;
        }
        .raw-data {
            background: #2c3e50;
            color: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .summary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background: #f8f9fa;
            font-weight: bold;
        }
        .product-names {
            background: #e8f5e8;
            color: #27ae60;
            font-weight: bold;
        }
        .item-count {
            background: #fdf2f2;
            color: #e74c3c;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 API Test - Website Orders Product Names</h1>
        
        <div class="input-group">
            <label for="token-input">JWT Token:</label>
            <input type="text" id="token-input" placeholder="Paste your JWT token here">
            <small style="color: #7f8c8d; margin-top: 5px; display: block;">
                Get token from browser console: <code>localStorage.getItem('token')</code>
            </small>
        </div>
        
        <button onclick="testAPI()">🚀 Test API</button>
        <button onclick="clearResults()">🗑️ Clear</button>
        
        <div id="result"></div>
    </div>

    <script>
        const API_URL = 'http://api.giftgala.in/api/website/orders?page=1&limit=10';

        async function testAPI() {
            const token = document.getElementById('token-input').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!token) {
                resultDiv.innerHTML = '<div class="status error">❌ Please enter a JWT token</div>';
                return;
            }

            resultDiv.innerHTML = '<div class="status loading">🔄 Testing API...</div>';

            try {
                console.log('🌐 Making API request to:', API_URL);
                
                // Clean the token to remove any non-ASCII characters
                const cleanToken = token.replace(/[^\x00-\x7F]/g, "");
                console.log('🔑 Using token:', cleanToken.substring(0, 20) + '...');
                
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + cleanToken,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();
                
                console.log('📦 Full API Response:', data);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${data.message || 'Unknown error'}`);
                }

                if (!data.success) {
                    resultDiv.innerHTML = `<div class="status error">❌ API Error: ${data.message || 'Unknown error'}</div>`;
                    return;
                }

                const orders = data.data?.orders || data.orders || [];
                
                console.log('📋 Orders array:', orders);

                if (orders.length === 0) {
                    resultDiv.innerHTML = '<div class="status error">📭 No orders found</div>';
                    return;
                }

                // Count orders with/without products
                let ordersWithProducts = 0;
                let ordersWithoutProducts = 0;
                let totalProducts = 0;

                orders.forEach(order => {
                    if (order.products && order.products.length > 0) {
                        ordersWithProducts++;
                        totalProducts += order.products.length;
                    } else {
                        ordersWithoutProducts++;
                    }
                });

                let html = `
                    <div class="summary">
                        <h2>📊 API Test Results</h2>
                        <p><strong>${orders.length}</strong> orders found</p>
                        <p><strong>${ordersWithProducts}</strong> orders WITH products | <strong>${ordersWithoutProducts}</strong> orders WITHOUT products</p>
                        <p><strong>${totalProducts}</strong> total products</p>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>Order Number</th>
                                <th>Customer</th>
                                <th>Amount</th>
                                <th>Item Count</th>
                                <th>Products Display</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                orders.forEach(order => {
                    const productDisplay = order.products && order.products.length > 0 
                        ? order.products.map(p => p.product_name).join(', ')
                        : `${order.item_count || 0} item(s)`;
                    
                    const productClass = order.products && order.products.length > 0 ? 'product-names' : 'item-count';
                    
                    html += `
                        <tr>
                            <td>${order.order_number}</td>
                            <td>${order.customer_name || 'N/A'}</td>
                            <td>${order.currency || '$'}${order.total_amount}</td>
                            <td>${order.item_count}</td>
                            <td class="${productClass}">${productDisplay}</td>
                            <td>${order.status}</td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                
                // Add detailed view
                orders.forEach(order => {
                    html += `
                        <div class="order-card">
                            <div class="order-header">
                                📦 ${order.order_number} - ${order.customer_name || 'Unknown Customer'}
                            </div>
                            
                            <p><strong>Amount:</strong> ${order.currency || '$'}${order.total_amount}</p>
                            <p><strong>Item Count:</strong> ${order.item_count}</p>
                            <p><strong>Status:</strong> ${order.status}</p>
                            
                            <div style="margin-top: 15px;">
                                <strong>Products Array Analysis:</strong>
                                <ul>
                                    <li>Products exists: ${order.products ? 'YES' : 'NO'}</li>
                                    <li>Products is array: ${Array.isArray(order.products) ? 'YES' : 'NO'}</li>
                                    <li>Products length: ${order.products?.length || 0}</li>
                                </ul>
                            </div>
                            
                            <div style="margin-top: 15px;">
                                <strong>Product Names:</strong>
                    `;
                    
                    if (order.products && order.products.length > 0) {
                        order.products.forEach(product => {
                            html += `<div class="product-item">✅ ${product.product_name} (Qty: ${product.quantity}, Price: $${product.unit_price})</div>`;
                        });
                    } else {
                        html += `<div class="no-products">❌ NO PRODUCTS FOUND!</div>`;
                    }
                    
                    html += `
                            </div>
                            
                            <details style="margin-top: 15px;">
                                <summary><strong>Raw Order JSON</strong></summary>
                                <div class="raw-data">${JSON.stringify(order, null, 2)}</div>
                            </details>
                        </div>
                    `;
                });

                resultDiv.innerHTML = html;

            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.innerHTML = `
                    <div class="status error">
                        ❌ Error: ${error.message}
                        <br><small>Check browser console for details</small>
                    </div>
                `;
            }
        }

        function clearResults() {
            document.getElementById('result').innerHTML = '';
        }

        // Auto-fill token from localStorage if available
        window.addEventListener('load', () => {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    document.getElementById('token-input').value = token;
                    console.log('✅ Auto-filled token from localStorage');
                }
            } catch (e) {
                console.log('ℹ️ Could not access localStorage');
            }
        });
    </script>
</body>
</html>
