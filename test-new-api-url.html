<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test New API URL - api.giftgala.in</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        .result { background: #f8f9fa; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #0056b3; }
        pre { background: #2d3748; color: #e2e8f0; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌐 Test New API URL</h1>
        <p><strong>New API Base:</strong> <code>http://api.giftgala.in</code></p>
        <p><strong>Old API Base:</strong> <code>https://13.212.51.226:8443</code> (replaced)</p>
        
        <div>
            <input type="text" id="token" style="width: 400px; padding: 8px;" placeholder="JWT Token (auto-filled)">
            <button class="btn" onclick="testNewAPI()">🚀 Test New API</button>
            <button class="btn" onclick="testOldAPI()">🔍 Test Old API</button>
            <button class="btn" onclick="clearResults()">🗑️ Clear</button>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        const NEW_API_URL = 'http://api.giftgala.in/api/website/orders?page=1&limit=3';
        const OLD_API_URL = 'https://13.212.51.226:8443/api/website/orders?page=1&limit=3';

        // Auto-fill token from localStorage
        window.addEventListener('load', () => {
            try {
                const token = localStorage.getItem('token');
                if (token) {
                    document.getElementById('token').value = token;
                    console.log('✅ Auto-filled token from localStorage');
                }
            } catch (e) {
                console.log('ℹ️ Could not access localStorage');
            }
        });

        async function testNewAPI() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="result info">🔄 Testing NEW API URL...</div>';

            try {
                console.log('🌐 Testing NEW API:', NEW_API_URL);
                
                const headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };

                if (token) {
                    headers['Authorization'] = 'Bearer ' + token.replace(/[^\x00-\x7F]/g, "");
                }
                
                const response = await fetch(NEW_API_URL, {
                    method: 'GET',
                    headers: headers
                });

                const data = await response.json();
                
                console.log('📦 NEW API Response:', data);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${data.message || 'Unknown error'}`);
                }

                if (!data.success) {
                    resultDiv.innerHTML = `<div class="result error">❌ NEW API Error: ${data.message || 'Unknown error'}</div>`;
                    return;
                }

                const orders = data.data?.orders || data.orders || [];
                
                let html = `
                    <div class="result success">
                        ✅ NEW API SUCCESS!<br>
                        🌐 URL: ${NEW_API_URL}<br>
                        📊 Found ${orders.length} orders<br>
                        🛍️ Orders with products: ${orders.filter(o => o.products && o.products.length > 0).length}
                    </div>
                `;

                if (orders.length > 0) {
                    html += '<div class="result info"><strong>Sample Orders:</strong><br>';
                    orders.slice(0, 2).forEach(order => {
                        const productNames = order.products && order.products.length > 0 
                            ? order.products.map(p => p.product_name).join(', ')
                            : `${order.item_count || 0} item(s)`;
                        
                        html += `• ${order.order_number}: ${productNames}<br>`;
                    });
                    html += '</div>';
                }

                html += `<details><summary>Raw Response</summary><pre>${JSON.stringify(data, null, 2)}</pre></details>`;

                resultDiv.innerHTML = html;

            } catch (error) {
                console.error('❌ NEW API Error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ NEW API Error: ${error.message}
                        <br><small>Check browser console for details</small>
                    </div>
                `;
            }
        }

        async function testOldAPI() {
            const token = document.getElementById('token').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '<div class="result info">🔄 Testing OLD API URL...</div>';

            try {
                console.log('🌐 Testing OLD API:', OLD_API_URL);
                
                const headers = {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                };

                if (token) {
                    headers['Authorization'] = 'Bearer ' + token.replace(/[^\x00-\x7F]/g, "");
                }
                
                const response = await fetch(OLD_API_URL, {
                    method: 'GET',
                    headers: headers
                });

                const data = await response.json();
                
                console.log('📦 OLD API Response:', data);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${data.message || 'Unknown error'}`);
                }

                resultDiv.innerHTML = `
                    <div class="result success">
                        ✅ OLD API Still Works<br>
                        🌐 URL: ${OLD_API_URL}<br>
                        📊 Found ${data.data?.orders?.length || 0} orders
                    </div>
                `;

            } catch (error) {
                console.error('❌ OLD API Error:', error);
                resultDiv.innerHTML = `
                    <div class="result error">
                        ❌ OLD API Error: ${error.message}
                        <br>This is expected if the old server is down
                    </div>
                `;
            }
        }

        function clearResults() {
            document.getElementById('result').innerHTML = '';
        }
    </script>
</body>
</html>
