<!DOCTYPE html>
<html>
<head>
    <title>Debug Timeline KPI Cards</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0F172A; color: white; padding: 20px; }
        .kpi-card { background: #1E293B; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .kpi-label { font-size: 12px; color: #94A3B8; margin-bottom: 5px; }
        .kpi-value { font-size: 18px; font-weight: bold; }
        .positive { color: #4ADE80; }
        .negative { color: #F87171; }
        .neutral { color: #94A3B8; }
        .debug { background: #334155; padding: 10px; margin: 10px 0; border-radius: 5px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Timeline KPI Cards Debug</h1>
    
    <div class="debug">
        <h3>API Test</h3>
        <button onclick="testAPI()">Test Timeline API</button>
        <div id="api-result"></div>
    </div>

    <div class="debug">
        <h3>KPI Cards Preview</h3>
        <div id="kpi-cards"></div>
    </div>

    <script>
        // Mock data for testing
        const mockSummary = {
            opening: 12,
            bulkUpload: 0,
            dispatch: 3,
            damage: 5,
            returns: 0,
            recovery: 1,
            selfTransferIn: 0,
            selfTransferOut: 0,
            finalStock: 5
        };

        function renderKPICards(summary) {
            const kpiData = [
                { label: 'Opening', value: summary.opening || 0, color: 'neutral' },
                { label: 'Bulk Upload', value: summary.bulkUpload || 0, color: 'neutral' },
                { label: 'Dispatch', value: summary.dispatch ? `-${summary.dispatch}` : '0', color: 'negative' },
                { label: 'Damaged', value: summary.damage ? `-${summary.damage}` : '0', color: 'negative' },
                { label: 'Returns', value: summary.returns ? `+${summary.returns}` : '0', color: 'positive' },
                { label: 'Recovery', value: summary.recovery ? `+${summary.recovery}` : '0', color: 'positive' },
                { label: 'Transfer In', value: summary.selfTransferIn ? `+${summary.selfTransferIn}` : '0', color: 'positive' },
                { label: 'Transfer Out', value: summary.selfTransferOut ? `-${summary.selfTransferOut}` : '0', color: 'negative' },
            ];

            const kpiHTML = kpiData.map(kpi => `
                <div class="kpi-card">
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value ${kpi.color}">${kpi.value}</div>
                </div>
            `).join('');

            const currentBalanceHTML = `
                <div class="kpi-card" style="background: #1E293B; border: 1px solid #334155;">
                    <div class="kpi-label">CURRENT BALANCE</div>
                    <div class="kpi-value" style="color: #60A5FA; font-size: 28px;">${summary.finalStock || 0}</div>
                </div>
            `;

            document.getElementById('kpi-cards').innerHTML = kpiHTML + currentBalanceHTML;
        }

        async function testAPI() {
            const resultDiv = document.getElementById('api-result');
            resultDiv.innerHTML = 'Testing API...';

            try {
                // You'll need to replace with actual token
                const token = 'YOUR_TOKEN_HERE';
                const response = await fetch('https://api.giftgala.in/api/timeline/2005-999', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h4>API Response:</h4>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;

                if (data.success && data.data && data.data.summary) {
                    renderKPICards({
                        opening: data.data.summary.breakdown?.opening || 0,
                        bulkUpload: data.data.summary.breakdown?.bulk_upload || 0,
                        dispatch: data.data.summary.breakdown?.dispatch || 0,
                        damage: data.data.summary.breakdown?.damage || 0,
                        returns: data.data.summary.breakdown?.returns || 0,
                        recovery: data.data.summary.breakdown?.recovery || 0,
                        selfTransferIn: data.data.summary.breakdown?.self_transfer_in || 0,
                        selfTransferOut: data.data.summary.breakdown?.self_transfer_out || 0,
                        finalStock: data.data.summary.current_stock || 0
                    });
                }
            } catch (error) {
                resultDiv.innerHTML = `<div style="color: #F87171;">Error: ${error.message}</div>`;
            }
        }

        // Render mock data on load
        renderKPICards(mockSummary);
    </script>
</body>
</html>
